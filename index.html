<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Stack</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #phaser-game { line-height: 0; }
        #hint {
            color: #a0a0c0;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="phaser-game"></div>
    <div id="hint">
        [← →] 열 이동  ·  [Space] 배치  ·  [R] 다시 시작
    </div>

    <!-- Phaser 3 (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>

    <!-- 게임 코드 — 상수 → 오브젝트 → 씬 순서로 로드 -->
    <script src="src/config.js"></script>
    <script src="src/objects/Tetromino.js"></script>
    <script src="src/objects/Grid.js"></script>
    <script src="src/objects/CardDeck.js"></script>
    <script src="src/scenes/GameScene.js"></script>

    <script>
        new Phaser.Game({
            type: Phaser.AUTO,
            width: CONFIG.GAME_WIDTH,
            height: CONFIG.GAME_HEIGHT,
            backgroundColor: CONFIG.BG_COLOR,
            parent: 'phaser-game',
            scene: [GameScene]
        });
    </script>
</body>
</html>
